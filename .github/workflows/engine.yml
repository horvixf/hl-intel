name: engine
on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'   # self-heal backup if the chain ever breaks
permissions:
  contents: write
  actions: write
concurrency:
  group: engine
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests
      - name: configure git
        run: |
          git config user.name "engine-bot"
          git config user.email "bot@users.noreply.github.com"
      - name: run engine loop
        env:
          LOOP_MINUTES: '330'
          CYCLE_SEC: '300'
          COMMIT_EVERY: '3'
        run: python engine/copy_engine.py
      - name: re-dispatch next session
        if: always()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/engine.yml/dispatches \
            -d '{"ref":"main"}'
